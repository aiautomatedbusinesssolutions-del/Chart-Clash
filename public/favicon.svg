<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#0f172a"/>
  <!-- Candlestick 1 (red/bearish) -->
  <line x1="8" y1="6" x2="8" y2="26" stroke="#fb7185" stroke-width="1.5"/>
  <rect x="6" y="10" width="4" height="10" rx="0.5" fill="#fb7185"/>
  <!-- Candlestick 2 (green/bullish) -->
  <line x1="16" y1="8" x2="16" y2="28" stroke="#34d399" stroke-width="1.5"/>
  <rect x="14" y="12" width="4" height="12" rx="0.5" fill="#34d399"/>
  <!-- Candlestick 3 (green/bullish, higher) -->
  <line x1="24" y1="4" x2="24" y2="22" stroke="#34d399" stroke-width="1.5"/>
  <rect x="22" y="6" width="4" height="10" rx="0.5" fill="#34d399"/>
</svg>
